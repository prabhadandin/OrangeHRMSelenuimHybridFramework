name: CI - Run Selenium Tests

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout your repository
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Setup .NET SDK
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '7.0'

      # 3️⃣ Install Google Chrome
      - name: Install Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip
          wget https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt install -y ./google-chrome-stable_current_amd64.deb

      # 4️⃣ Check Chrome version
      - name: Verify Chrome
        run: google-chrome --version

      # 5️⃣ Install matching ChromeDriver
      - name: Install ChromeDriver
        uses: nanasess/setup-chromedriver@v1
        with:
          chrome-version: latest

      # 6️⃣ Check ChromeDriver version
      - name: Verify ChromeDriver
        run: chromedriver --version

      # 7️⃣ Restore dependencies
      - name: Restore dependencies
        run: dotnet restore

      # 8️⃣ Build project
      - name: Build project
        run: dotnet build --no-restore

      # 9️⃣ Run Selenium tests
      - name: Run Selenium tests
        run: dotnet test --no-build --logger "trx;LogFileName=test_results.trx"

      # 🔟 Optional: Publish test results (for GitHub green dot)
      - name: Publish Test Results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: TestResults
          path: '**/test_results.trx'
