name: CI - Run Selenium Tests

on:
  push:
    branches: [ "main", "master", "framework-refactor" ]
  pull_request:
    branches: [ "main", "master" ]
env:
  # Force actions to use Node.js 24 to avoid Node 20 deprecation
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  checks: write
  pull-requests: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5   # Updated to v5 for Node 24 support
        with:
          dotnet-version: '8.0.x' 

      - name: Install Google Chrome
        run: |
          sudo apt-get update
          sudo apt install -y google-chrome-stable

      - name: Install ChromeDriver
        uses: nanasess/setup-chromedriver@v2

      - name: Restore and Build
        run: |
          dotnet restore
          dotnet build --configuration Release --no-restore

      - name: Run Selenium tests
        run: dotnet test --configuration Release --no-build --logger "trx;LogFileName=test_results.trx"

      - name: Test Report
        uses: dorny/test-reporter@v1
        if: always() 
        with:
          name: NUnit Selenium Tests
          path: "**/test_results.trx"
          reporter: dotnet-trx

      - name: Upload Screenshots on Failure
        if: failure()
        uses: actions/upload-artifact@v5   # Updated to v5
        with:
          name: selenium-screenshots
          path: "**/Reports/Screenshots/*.png"

      - name: Upload Extent Reports
        if: always()
        uses: actions/upload-artifact@v5   # Updated to v5
        with:
          name: Extent-Automation-Report
          path: "**/Reports/"