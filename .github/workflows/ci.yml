name: CI - Run Selenium Tests

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

# Add permissions so the Test Reporter can post results
permissions:
  checks: write
  pull-requests: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '7.0'

      - name: Install Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip
          wget https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt install -y ./google-chrome-stable_current_amd64.deb

      - name: Install ChromeDriver
        uses: nanasess/setup-chromedriver@v1
        with:
          chrome-version: latest

      - name: Restore dependencies
        run: dotnet restore

      - name: Build project
        run: dotnet build --no-restore

      - name: Run Selenium tests
        run: dotnet test --no-build --logger "trx;LogFileName=test_results.trx"

      # 🔟 MOVE REPORTER HERE - After the tests run
      - name: Test Report
        uses: dorny/test-reporter@v1
        if: always() # Ensures report is created even if tests fail
        with:
          name: NUnit Selenium Tests
          path: '**/test_results.trx'
          reporter: dotnet-trx

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: TestResults
          path: '**/test_results.trx'
